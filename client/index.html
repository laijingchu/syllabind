<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      // Dark mode is the default. Only apply light if user explicitly chose it.
      // Migration: clear stale 'light' value from pre-dark-default era
      try {
        var t = localStorage.getItem('syllabind-ds-theme');
        var c = localStorage.getItem('syllabind-ds-theme-chosen');
        var isLight = t === 'light' && c;
        if (isLight) document.documentElement.classList.add('light');
        else if (t === 'light' && !c) localStorage.removeItem('syllabind-ds-theme');
        // Set favicon stroke color to match theme (black for light, white for dark)
        var link = document.querySelector('link[rel="icon"]');
        if (link) {
          var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="' + (isLight ? 'black' : 'white') + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>';
          link.href = 'data:image/svg+xml,' + encodeURIComponent(svg);
        }
      } catch(e) {}
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="Syllabind" />
    <meta property="og:description" content="A calm web platform where thought leaders bind the best of the web into 4-week syllabi." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@replit" />
    <meta name="twitter:title" content="Syllabind" />
    <meta name="twitter:description" content="A calm web platform where thought leaders bind the best of the web into 4-week syllabi." />
    <meta name="twitter:image" content="https://replit.com/public/images/opengraph.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importing Bricolage Grotesque (Display) and Plus Jakarta Sans (Text) -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </body>
</html>
